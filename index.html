    <style>
      body {
        margin: 0;
        min-width: 320px;
        background: rgb(253, 246, 238);
        color: rgb(148, 135, 124);
        font-family: system-ui, -apple-system, sans-serif;
      }
      #brandsamor-static-content {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .site-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        background: rgba(253, 246, 238, 0.92);
      }
      .site-header__bar {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 68px;
        padding: 1rem;
      }
      .site-header__menu-btn {
        position: absolute;
        left: 1rem;
        display: block;
      }
      .site-header__login {
        position: absolute;
        right: 1rem;
        font-size: 0.875rem;
        line-height: 1.25rem;
        text-decoration: none;
        color: rgb(43, 24, 10);
      }
      .site-header__nav {
        display: none;
      }
      .site-header-spacer {
        height: 68px;
      }
      @media (min-width: 1024px) {
        .site-header__bar {
          min-height: 72px;
          padding: 1.25rem 3rem;
        }
        .site-header__menu-btn {
          display: none;
        }
        .site-header__login {
          right: 3rem;
        }
        .site-header__nav {
          display: block;
        }
        .site-header-spacer {
          height: 114px;
        }
      }
      .hero-panel {
        position: relative;
        overflow: hidden;
        isolation: isolate;
        min-height: 300px;
        background-color: rgb(255, 92, 0);
        color: #fff;
      }
      .hero-panel--viewport {
        display: flex;
        flex-direction: column;
        min-height: calc(100svh - 68px);
      }
      @media (min-width: 1024px) {
        .hero-panel--viewport {
          min-height: calc(100svh - 114px);
        }
      }
      .hero-panel > img[aria-hidden='true'] {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
